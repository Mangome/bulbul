name: Release

on:
  push:
    tags: ['v*']

  # 允许手动触发（方便调试）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: ''

          # macOS Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY for updater signing.'
          }

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bulbul ${{ github.ref_name }}'
          releaseBody: |
            ## Bulbul ${{ github.ref_name }}

            下载对应平台的安装包：
            - **Windows**: `.msi` 或 `.exe` (NSIS 安装包)
            - **macOS (Apple Silicon)**: `_aarch64.dmg`

            ### macOS 用户注意
            由于应用未经 Apple 签名，打开时可能提示「已损坏」或「无法验证开发者」。请在终端执行以下命令后重新打开：
            ```bash
            xattr -rd com.apple.quarantine /Applications/bulbul.app
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  verify-release-assets:
    name: Verify release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Verify uploaded updater assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $assetOutput = gh release view $env:TAG_NAME --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name'
          $assetNames = @($assetOutput -split "`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

          if ($assetNames.Count -eq 0) {
            throw "Release $env:TAG_NAME does not contain any assets."
          }

          $hasLatestJson = $assetNames -contains 'latest.json'
          $hasWindowsInstaller = @($assetNames | Where-Object { $_ -match '\.(msi|exe)$' }).Count -gt 0
          $hasWindowsSignature = @($assetNames | Where-Object { $_ -match '\.(msi|exe)\.sig$' }).Count -gt 0
          $hasMacInstaller = @($assetNames | Where-Object { $_ -match '\.dmg$' }).Count -gt 0
          $hasMacUpdaterArchive = @($assetNames | Where-Object { $_ -match '\.app\.tar\.gz$' }).Count -gt 0
          $hasMacUpdaterSignature = @($assetNames | Where-Object { $_ -match '\.app\.tar\.gz\.sig$' }).Count -gt 0

          if (-not $hasLatestJson) {
            throw 'Release is missing latest.json.'
          }

          if (-not $hasWindowsInstaller -or -not $hasWindowsSignature) {
            throw 'Release is missing signed Windows updater assets (.msi/.exe and matching .sig).'
          }

          if (-not $hasMacInstaller -or -not $hasMacUpdaterArchive -or -not $hasMacUpdaterSignature) {
            throw 'Release is missing signed macOS updater assets (.dmg, .app.tar.gz and .app.tar.gz.sig).'
          }

          Write-Host 'Verified release assets:'
          $assetNames | ForEach-Object { Write-Host "- $_" }
