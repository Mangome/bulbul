name: Release

on:
  push:
    tags: ['v*']

  # 允许手动触发（方便调试）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: ''

          # macOS Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

          # macOS Intel
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bulbul ${{ github.ref_name }}'
          releaseBody: |
            ## Bulbul ${{ github.ref_name }}

            下载对应平台的安装包：
            - **Windows**: `.msi` 或 `.exe` (NSIS 安装包)
            - **macOS (Apple Silicon)**: `_aarch64.dmg`
            - **macOS (Intel)**: `_x64.dmg`

            ### macOS 用户注意
            由于应用未经 Apple 签名，打开时可能提示「已损坏」或「无法验证开发者」。请在终端执行以下命令后重新打开：
            ```bash
            xattr -rd com.apple.quarantine /Applications/bulbul.app
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
